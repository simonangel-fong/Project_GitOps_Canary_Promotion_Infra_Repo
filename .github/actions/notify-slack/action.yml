name: notify-slack
description: Post a workflow result summary to Slack via incoming webhook.

inputs:
  webhook-url:
    description: Slack incoming webhook URL.
    required: true
  needs-context:
    description: JSON-encoded `needs` context from the caller (pass `toJSON(needs)`).
    required: true

runs:
  using: composite
  steps:
    - name: Compute overall status
      id: status
      shell: bash
      env:
        NEEDS_JSON: ${{ inputs.needs-context }}
        WORKFLOW_NAME: ${{ github.workflow }}
        REPO: ${{ github.repository }}
      run: |
        if echo "$NEEDS_JSON" | jq -e 'to_entries[] | select(.value.result == "failure" or .value.result == "cancelled")' >/dev/null; then
          icon=":x:"
          color="danger"
          state="failed"
        elif echo "$NEEDS_JSON" | jq -e 'to_entries | all(.value.result == "success")' >/dev/null; then
          icon=":white_check_mark:"
          color="good"
          state="succeeded"
        else
          icon=":warning:"
          color="warning"
          state="completed with skipped jobs"
        fi
        {
          echo "icon=${icon}"
          echo "color=${color}"
          echo "title=${REPO} — ${WORKFLOW_NAME} ${state}"
        } >> "$GITHUB_OUTPUT"

    - name: Build Slack payload
      id: payload
      shell: bash
      env:
        ICON: ${{ steps.status.outputs.icon }}
        COLOR: ${{ steps.status.outputs.color }}
        TITLE: ${{ steps.status.outputs.title }}
        REPO: ${{ github.repository }}
        WORKFLOW_NAME: ${{ github.workflow }}
        BRANCH: ${{ github.ref_name }}
        COMMIT: ${{ github.sha }}
        RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      run: |
        jq -n \
          --arg icon    "$ICON" \
          --arg color   "$COLOR" \
          --arg title   "$TITLE" \
          --arg repo    "$REPO" \
          --arg wf      "$WORKFLOW_NAME" \
          --arg branch  "$BRANCH" \
          --arg commit  "$COMMIT" \
          --arg run_url "$RUN_URL" \
          '{
            text: "\($icon) *\($title)*",
            attachments: [{
              color: $color,
              fields: [
                { title: "Repository", value: $repo,   short: true },
                { title: "Workflow",   value: $wf,     short: true },
                { title: "Branch",     value: $branch, short: true },
                { title: "Commit",     value: $commit, short: true },
                { title: "Run",        value: $run_url, short: false }
              ]
            }]
          }' > slack-payload.json

    - name: Notify Slack
      uses: slackapi/slack-github-action@v3.0.3
      with:
        webhook: ${{ inputs.webhook-url }}
        webhook-type: incoming-webhook
        payload-file-path: slack-payload.json
