name: 10-ci-check

on:
  workflow_dispatch:
  push:
    branches:
      - "feature-*"
      - "hotfix-*"
    paths:
      - "infra/**"
      - "modules/**"
      - ".github/actions/**"
      - ".github/workflows/**"
  pull_request:
    branches:
      - dev
      - stage
      - prod
    paths:
      - "infra/**"
      - "modules/**"
      - ".github/actions/**"
      - ".github/workflows/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: none
  contents: read
  pull-requests: write
  security-events: write

env:
  TF_VERSION: "1.15.2"
  TFLINT_VERSION: "v0.58.1"
  WORKING_DIR: infra

jobs:
  tf-lint-check:
    name: tf-lint-check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: TF Lint Check
        uses: ./.github/actions/tf-lint-check
        with:
          working-directory: ${{ env.WORKING_DIR }}
          terraform-version: ${{ env.TF_VERSION }}
          tflint-version: ${{ env.TFLINT_VERSION }}

  tf-sec-scan:
    name: tf-sec-scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Trivy IaC Scan (infra)
        uses: ./.github/actions/security-scan
        with:
          scan-mode: config
          scan-ref: infra
          skip-dirs: "**/.terraform,**/terraform-aws-modules"
          sarif-category: trivy-iac-infra
          summary-title: Trivy IaC scan (infra)
          trivyignores: ${{ github.workspace }}/.trivyignore

      - name: Trivy IaC Scan (modules)
        uses: ./.github/actions/security-scan
        with:
          scan-mode: config
          scan-ref: modules
          skip-dirs: "**/.terraform,**/terraform-aws-modules"
          sarif-category: trivy-iac-modules
          summary-title: Trivy IaC scan (modules)
          trivyignores: ${{ github.workspace }}/.trivyignore

  secret-scan:
    name: secret-scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Trivy FS Secret Scan (repo)
        uses: ./.github/actions/security-scan
        with:
          scan-mode: secret
          scan-ref: .
          sarif-category: trivy-secret
          summary-title: Trivy secret scan
          trivyignores: ${{ github.workspace }}/.trivyignore

  notify-slack:
    name: notify-slack
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs:
      - tf-lint-check
      - tf-sec-scan
      - secret-scan
    if: always()
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Notify Slack
        uses: ./.github/actions/notify-slack
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          needs-context: ${{ toJSON(needs) }}
